<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Footprint — AI-powered personal carbon footprint tracker."/>
  <title>Footprint — AI Carbon Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg: #080d09; --green: #00e676; --green2: #00c853; --text: #d4ebd6; --text2: #7a9e7e; --border: #1e2e20; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .card { background: #0f1a11; border: 1px solid var(--border); border-radius: 12px; }
    .stat-card { background: #0d1710; border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; display: flex; gap: 14px; align-items: flex-start; }
    .grad-num { background: linear-gradient(135deg, var(--green), #26c6da); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-create { background: var(--green2); color: #080d09; border-radius: 8px; padding: 10px 16px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .commit-input { background: #0a1209; border: 1px solid #243328; border-radius: 8px; color: var(--text); padding: 10px 14px; }
    .sec-title { font-family: 'JetBrains Mono', monospace; font-size: .7rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; }
  </style>
</head>

<body>
  <main role="main" aria-label="Main Dashboard Content" class="max-w-screen-2xl mx-auto px-4 py-5 space-y-5" id="dashboard">
    <header class="flex justify-between items-center py-3">
        <h1 class="text-white font-bold">FOOTPRINT AI</h1>
        <button type="button" class="bg-green-600 px-4 py-2 rounded-lg" onclick="document.getElementById('log-panel').scrollIntoView({behavior:'smooth'})">LOG ACTIVITY</button>
    </header>

    <section class="grid grid-cols-2 lg:grid-cols-4 gap-3" aria-label="Key metrics">
      <div class="stat-card"><div><div class="text-xs">Annual Savings</div><div id="stat-offset" class="grad-num text-2xl font-bold">0.000</div></div></div>
      <div class="stat-card"><div><div class="text-xs">Streak</div><div class="text-xl font-bold text-orange-400"><span id="stat-streak">0</span> Days</div></div></div>
      <div class="stat-card"><div><div class="text-xs">Climate Standing</div><div id="stat-standing" class="text-lg font-bold text-blue-400">Getting Started</div></div></div>
      <div class="stat-card"><div><div class="text-xs">Tree Power</div><div id="stat-trees" class="text-xl font-bold text-purple-400">0</div></div></div>
    </section>

    <section class="card p-5" id="log-panel" aria-labelledby="log-heading">
        <h2 id="log-heading" class="sec-title mb-4" style="color:var(--green)">📝 LOG DAILY ACTIVITY</h2>
        <form id="log-form" novalidate>
            <label for="log-input" class="sr-only">Describe your activities</label>
            <textarea id="log-input" class="w-full bg-[#0a1209] border border-[#243328] p-3 rounded-lg" rows="3" placeholder='e.g. "Drove 15km to work"'></textarea>
            <button type="submit" id="log-submit" class="btn-create w-full mt-3">⚡ ANALYSE WITH GEMINI AI</button>
        </form>
    </section>

    <section class="card p-5" aria-labelledby="chart-heading">
        <h2 id="chart-heading" class="sec-title mb-4">ANNUAL FOOTPRINT</h2>
        <canvas id="footprint-chart" role="img" aria-label="Annual carbon footprint chart">
            <p>Annual carbon footprint breakdown chart</p>
        </canvas>
    </section>
  </main>

  <script src="/frontend/app.js" defer></script>
</body>
</html>
